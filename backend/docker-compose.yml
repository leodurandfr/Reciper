services:
  scraper-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: recettes-scrapper-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORT:-8742}:8080"
    environment:
      - PORT=8080
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8080/api/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  default:
    name: recettes-network
