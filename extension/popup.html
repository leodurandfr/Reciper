<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipper</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        width: 300px;
        padding: 16px;
        background: #FBFAF8;
        color: #2E2B25;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
      }

      .header img {
        width: 32px;
        height: 32px;
      }

      .header h1 {
        font-size: 18px;
        font-weight: 600;
      }

      .stats {
        background: #f0f0f0;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 16px;
        text-align: center;
      }

      .stats-number {
        font-size: 24px;
        font-weight: 700;
        color: #FF5500;
      }

      .stats-label {
        font-size: 12px;
        color: #666;
      }

      .actions {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 0.2s;
      }

      .btn-primary {
        background: #FF5500;
        color: white;
      }

      .btn-primary:hover {
        background: #e64d00;
      }

      .btn-secondary {
        background: #e0e0e0;
        color: #333;
      }

      .btn-secondary:hover {
        background: #d0d0d0;
      }

      .btn-secondary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .status {
        margin-top: 12px;
        padding: 8px;
        border-radius: 4px;
        font-size: 12px;
        text-align: center;
      }

      .status.success {
        background: #d4edda;
        color: #155724;
      }

      .status.error {
        background: #f8d7da;
        color: #721c24;
      }

      .status.info {
        background: #cce5ff;
        color: #004085;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <img src="./icons/icon48.png" alt="Recipper">
      <h1>Recipper</h1>
    </div>

    <div class="stats">
      <div class="stats-number" id="recipeCount">-</div>
      <div class="stats-label">recettes sauvegardées</div>
    </div>

    <div class="actions">
      <button class="btn-primary" id="openApp">Ouvrir mes recettes</button>
      <button class="btn-secondary" id="addCurrent" disabled>Ajouter cette page</button>
    </div>

    <div id="status" class="status" style="display: none;"></div>

    <script src="./popup.js" type="module"></script>
  </body>
</html>
